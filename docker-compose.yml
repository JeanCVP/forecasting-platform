services:

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    container_name: mlflow-server
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
    volumes:
      - ./mlruns:/mlflow/mlruns

  prefect:
    image: prefecthq/prefect:3-python3.12
    container_name: prefect-server
    command: prefect server start
    ports:
      - "4200:4200"